//مشروع عمل card 

let names = ['ahmed','ali','gamal','abdelrahman'];
let ages= ['18 years old','17 years old','22 years old','20 years old'];
let container = document.createElement('div'); //انشاء العنصر ديف
document.body.appendChild(container); // اضافة الكونتينر الى الbody
container.style.textAlign = 'center'; //تنسيق المحتوى في الوسط 
function element(name,ages) //عمل فنكشن للكاردز لكي لا اضطر الى كتابة اكودا لكل كارد 
{
    // elements
    let card = document.createElement('div');
    let title = document.createElement('h2');
    let age = document.createElement('p');
    let img = document.createElement('img');
    // content
    let head = document.createTextNode(name);
    let ageContent = document.createTextNode(ages);
    img.src = 'img/1.jpg';
    title.appendChild(head);
    age.appendChild(ageContent);
    // style
    card.style.width = '200px';
    card.style.background = '#444';
    card.style.color = '#fff';
    card.style.padding = '10px';
    card.style.margin = '2px';
    card.style.display = 'inline-block';
    img.style.width = '100%';
    card.appendChild(title);
    card.appendChild(age);
    card.appendChild(img);
    container.appendChild(card);
}

element(); //استدعاء الفنكششن ليعمل , هنا يعمل كادر وحده لانه تم استدعاؤه مره واحده 

//الحل اعمل لوب ليتكرر الكادر عدد مرات  محدده
for(let i = 0; i < 4; i++)
{
    element(names[i], ages[i]);
}
