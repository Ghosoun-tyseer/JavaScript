function canIGetADrivingLicense(age) {
  if (age >= 20) {
    return "yes you can";
  } else {
    let years = 20 - age;
    return "please come back after " + years + " years to get one";
  }
}

// yes you can

//way1 using if 
function sameLength(str1, str2) {
  if (str1.length === str2.length) {
    return true;
  } else {
    return false;
  }
}
console.log(sameLength("tree", "clue")); // true
console.log(sameLength("tree", "car"));  // false

//way2 using === direct 

function sameLength2(str1, str2) {
  return str1.length === str2.length;
}
console.log(sameLength2("tree", "clue")); // true
